<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de productos</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>GALERIA DE PRODUCTOS</h1>
        <a href="#productos" id="productos">Productos</a>
        <input type="text" id="buscarProducto" placeholder="Buscar producto">
    </header>
    <main>
        <div class="contenedor">
        </div>
        <form id="formProducto" action="#" method="post">
            <label for="selectCategorias">Seleccionar categoría existente:</label>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Nombre del producto" required>
            <label for="precio">Precio:</label>
            <input type="number" id="precio" name="precio" placeholder="Precio del producto" required>
            <label for="stock">Stock:</label>
            <input type="text" id="stock" name="stock" placeholder="Stock del producto" required>
            <label for="categoriaId">Categoria:</label>
            <input type="text" id="categoriaId" name="categoriaId" placeholder="Categoria del producto" required>
            <button id="AgregarProducto" type="submit">Agregar producto</button>
            <button id="cancelEdit" type="button">Cancelar</button>
        </form>
    </main>
</body>
</html>
